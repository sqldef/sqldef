# yaml-language-server: $schema=../testutils/testcase.schema.json

# Managed roles tests: When managed_roles is set, privileges for those roles are managed.
# With manage_privileges_only: true, only GRANT/REVOKE are managed (no CREATE/ALTER/DROP ROLE).

ManagedRolesBasicGrant:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO readonly_user;
  managed_roles:
    - readonly_user
  manage_privileges_only: true
  up: |
    GRANT SELECT ON TABLE "public"."users" TO "readonly_user";
  down: |
    REVOKE SELECT ON TABLE "public"."users" FROM "readonly_user";

ManagedRolesMultipleRoles:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO readonly_user;
    GRANT SELECT, INSERT, UPDATE ON TABLE "public"."users" TO "app_user";
  managed_roles:
    - readonly_user
    - app_user
  manage_privileges_only: true
  up: |
    GRANT SELECT ON TABLE "public"."users" TO "readonly_user";
    GRANT SELECT, INSERT, UPDATE ON TABLE "public"."users" TO "app_user";
  down: |
    REVOKE INSERT, SELECT, UPDATE ON TABLE "public"."users" FROM "app_user";
    REVOKE SELECT ON TABLE "public"."users" FROM "readonly_user";

ManagedRolesIgnoreUnmanagedRole:
  # admin_role is not in managed_roles, so its GRANT is ignored
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO readonly_user;
    GRANT ALL PRIVILEGES ON TABLE "public"."users" TO "admin_role";
  managed_roles:
    - readonly_user
  manage_privileges_only: true
  up: |
    GRANT SELECT ON TABLE "public"."users" TO "readonly_user";
  down: |
    REVOKE SELECT ON TABLE "public"."users" FROM "readonly_user";

ManagedRolesEmptyListNoChanges:
  # Empty managed_roles means "manage no roles", so no privilege or role changes
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO readonly_user;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO readonly_user;
  managed_roles: []
  manage_privileges_only: true
  up: ""
  down: ""

ManagedRolesEmptyListIgnoresOrphans:
  # Empty managed_roles means "manage no roles", so orphaned privileges and roles should be ignored
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO readonly_user;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  managed_roles: []
  manage_privileges_only: true
  up: ""
  down: ""

ManagedRolesAddPrivileges:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO app_user;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT, INSERT, UPDATE ON TABLE "public"."users" TO "app_user";
  managed_roles:
    - app_user
  manage_privileges_only: true
  up: |
    GRANT INSERT, UPDATE ON TABLE "public"."users" TO "app_user";
  down: |
    REVOKE INSERT, UPDATE ON TABLE "public"."users" FROM "app_user";

ManagedRolesRevoke:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT INSERT, SELECT, UPDATE ON TABLE "public"."users" TO "app_user";
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO app_user;
  managed_roles:
    - app_user
  manage_privileges_only: true
  up: |
    REVOKE INSERT, UPDATE ON TABLE "public"."users" FROM "app_user";
  down: |
    GRANT INSERT, UPDATE ON TABLE "public"."users" TO "app_user";

ManagedRolesRevokeAll:
  # When role is managed but no longer has any GRANT in desired, revoke all privileges
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT INSERT, SELECT, UPDATE ON TABLE "public"."users" TO "app_user";
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  managed_roles:
    - app_user
  manage_privileges_only: true
  up: |
    REVOKE INSERT, SELECT, UPDATE ON TABLE "public"."users" FROM "app_user";
  down: |
    GRANT INSERT, SELECT, UPDATE ON TABLE "public"."users" TO "app_user";

ManagedRolesPublic:
  # PUBLIC is a special pseudo-role in PostgreSQL, no CREATE ROLE needed
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE "public"."users" TO PUBLIC;
  managed_roles:
    - PUBLIC
  manage_privileges_only: true
  up: |
    GRANT SELECT ON TABLE "public"."users" TO PUBLIC;
  down: |
    REVOKE SELECT ON TABLE "public"."users" FROM PUBLIC;

ManagedRolesAllPrivileges:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT ALL PRIVILEGES ON TABLE "public"."users" TO "admin_role";
  managed_roles:
    - admin_role
  manage_privileges_only: true
  up: |
    GRANT ALL PRIVILEGES ON TABLE "public"."users" TO "admin_role";
  down: |
    REVOKE ALL PRIVILEGES ON TABLE "public"."users" FROM "admin_role";

ManagedRolesIdempotent:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO readonly_user;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO readonly_user;
  managed_roles:
    - readonly_user
  manage_privileges_only: true
  up: ""
  down: ""

ManagedRolesOverlappingGrants:
  # Tests that overlapping GRANT statements don't cause incorrect REVOKEs
  # user1 should retain SELECT because it's granted by the first GRANT statement
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO user1;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT, INSERT ON TABLE users TO user1, user2;
    GRANT UPDATE, DELETE ON TABLE users TO user1, user3;
  managed_roles:
    - user1
    - user2
    - user3
  manage_privileges_only: true
  up: |
    GRANT INSERT ON TABLE "public"."users" TO "user1";
    GRANT SELECT, INSERT ON TABLE "public"."users" TO "user2";
    GRANT UPDATE, DELETE ON TABLE "public"."users" TO "user1", "user3";
  down: |
    REVOKE DELETE, INSERT, UPDATE ON TABLE "public"."users" FROM "user1";
    REVOKE INSERT, SELECT ON TABLE "public"."users" FROM "user2";
    REVOKE DELETE, UPDATE ON TABLE "public"."users" FROM "user3";

ManagedRolesMultipleTables:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    CREATE TABLE posts (
      id BIGINT PRIMARY KEY,
      title VARCHAR(100)
    );
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    CREATE TABLE posts (
      id BIGINT PRIMARY KEY,
      title VARCHAR(100)
    );
    GRANT SELECT, INSERT, UPDATE ON TABLE users, posts TO app_user;
  managed_roles:
    - app_user
  manage_privileges_only: true
  up: |
    GRANT SELECT, INSERT, UPDATE ON TABLE "public"."users" TO "app_user";
    GRANT SELECT, INSERT, UPDATE ON TABLE "public"."posts" TO "app_user";
  down: |
    REVOKE INSERT, SELECT, UPDATE ON TABLE "public"."posts" FROM "app_user";
    REVOKE INSERT, SELECT, UPDATE ON TABLE "public"."users" FROM "app_user";

ManagedRolesErrorGrantOption:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    grant select on table users to readonly_user with grant option;
  managed_roles:
    - readonly_user
  manage_privileges_only: true
  error: "WITH GRANT OPTION is not supported yet"

ManagedRolesErrorCascade:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    grant select on table users to readonly_user;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    revoke select on table users from readonly_user cascade;
  managed_roles:
    - readonly_user
  manage_privileges_only: true
  error: "CASCADE/RESTRICT options are not supported yet"

ManagedRolesPartialRevokeFromAll:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT ALL PRIVILEGES ON TABLE users TO admin_role;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT, INSERT, UPDATE ON TABLE users TO admin_role;
  managed_roles:
    - admin_role
  manage_privileges_only: true
  up: |
    REVOKE DELETE, REFERENCES, TRIGGER, TRUNCATE ON TABLE "public"."users" FROM "admin_role";
  down: |
    GRANT DELETE, REFERENCES, TRIGGER, TRUNCATE ON TABLE "public"."users" TO "admin_role";

ManagedRolesSpecialCharacters:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO "user-with-dash";
    GRANT INSERT ON TABLE users TO "user.with.dot";
    GRANT UPDATE ON TABLE users TO "user@domain.com";
  managed_roles:
    - user-with-dash
    - user.with.dot
    - user@domain.com
  manage_privileges_only: true
  up: |
    GRANT SELECT ON TABLE "public"."users" TO "user-with-dash";
    GRANT INSERT ON TABLE "public"."users" TO "user.with.dot";
    GRANT UPDATE ON TABLE "public"."users" TO "user@domain.com";
  down: |
    REVOKE SELECT ON TABLE "public"."users" FROM "user-with-dash";
    REVOKE INSERT ON TABLE "public"."users" FROM "user.with.dot";
    REVOKE UPDATE ON TABLE "public"."users" FROM "user@domain.com";

ManagedRolesMixedGrantRevoke:
  current: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT, INSERT, DELETE ON TABLE users TO app_user;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT, UPDATE ON TABLE users TO app_user;
  managed_roles:
    - app_user
  manage_privileges_only: true
  up: |
    REVOKE DELETE, INSERT ON TABLE "public"."users" FROM "app_user";
    GRANT UPDATE ON TABLE "public"."users" TO "app_user";
  down: |
    REVOKE UPDATE ON TABLE "public"."users" FROM "app_user";
    GRANT INSERT, DELETE ON TABLE "public"."users" TO "app_user";

# Test DROP ROLE when role is removed from desired schema
# These tests use offline mode because role lifecycle operations are non-transactional
ManagedRolesDropRole:
  offline: true
  current: |
    CREATE ROLE orphan_role;
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO orphan_role;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  managed_roles:
    - orphan_role
  enable_drop: true
  up: |
    REVOKE ALL ON TABLE "public"."users" FROM "orphan_role";
    DROP ROLE "orphan_role";
  down: |
    CREATE ROLE "orphan_role";
    GRANT SELECT ON TABLE "public"."users" TO "orphan_role";

ManagedRolesDropRoleDisabled:
  offline: true
  current: |
    CREATE ROLE orphan_role;
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
    GRANT SELECT ON TABLE users TO orphan_role;
  desired: |
    CREATE TABLE users (
      id BIGINT PRIMARY KEY,
      name VARCHAR(100)
    );
  managed_roles:
    - orphan_role
  enable_drop: false
  up: |
    -- Skipped: REVOKE ALL ON TABLE "public"."users" FROM "orphan_role";
    -- Skipped: DROP ROLE "orphan_role";
  down: |
    CREATE ROLE "orphan_role";
    GRANT SELECT ON TABLE "public"."users" TO "orphan_role";
