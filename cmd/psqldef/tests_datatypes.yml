# Regression test: TIMESTAMPTZ and "timestamp with time zone" must be treated as identical.
# PostgreSQL exports "timestamp with time zone" but users may write TIMESTAMPTZ in desired SQL.
# https://github.com/sqldef/sqldef/discussions/1154
TimestamptzIdempotency:
  legacy_ignore_quotes: false
  offline: true
  current: |
    CREATE TABLE users (
      id uuid PRIMARY KEY,
      create_time timestamp with time zone NOT NULL DEFAULT CURRENT_TIMESTAMP
    );
  desired: |
    CREATE TABLE users (
      id uuid PRIMARY KEY,
      create_time TIMESTAMPTZ NOT NULL DEFAULT CURRENT_TIMESTAMP
    );
  up: ""
  down: ""

TimetzIdempotency:
  legacy_ignore_quotes: false
