# yaml-language-server: $schema=../../testutil/testcase.schema.json
CreateTableWithExtensionColumn:
  # EXTENSION is non-reserved in PostgreSQL, so it is valid as a column name.
  # https://www.postgresql.org/docs/current/sql-keywords-appendix.html
  desired: |
    CREATE TABLE t (
      extension text
    );

CreateTable:
  desired: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name text,
      age integer
    );
    CREATE TABLE bigdata (
      data bigint
    );
DropTable:
  current: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name text,
      age integer
    );
    CREATE TABLE bigdata (
      data bigint
    );
  desired: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name text,
      age integer
    );
  up: |
    DROP TABLE "public"."bigdata";
  down: |
    CREATE TABLE bigdata (
      data bigint
    );
EmptyTable:
  desired: |
    CREATE TABLE public.test ();
CreateTableAlterColumn:
  current: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name text
    );
  desired: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name varchar(40)
    );
  up: |
    ALTER TABLE "public"."users" ALTER COLUMN "name" TYPE varchar(40);
  down: |
    ALTER TABLE "public"."users" ALTER COLUMN "name" TYPE text;
CreateTableAddColumn:
  current: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name text
    );
  desired: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name text,
      age integer
    );
  up: |
    ALTER TABLE "public"."users" ADD COLUMN "age" integer;
  down: |
    ALTER TABLE "public"."users" DROP COLUMN "age";
CreateTableDropColumn:
  current: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name text,
      age integer
    );
  desired: |
    CREATE TABLE users (
      id bigint NOT NULL,
      age integer
    );
  up: |
    ALTER TABLE "public"."users" DROP COLUMN "name";
  down: |
    ALTER TABLE "public"."users" ADD COLUMN "name" text;
CreateTableOnNonStandardDefaultSchema:
  desired: |
    CREATE TABLE users (
      id bigint NOT NULL,
      name text,
      age integer
